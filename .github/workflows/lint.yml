name: XML Lint

on:
  push:
    branches: [main]
    paths:
      - 'templates/*.xml'
  pull_request:
    paths:
      - 'templates/*.xml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate XML files
        run: |
          find templates -name "*.xml" -exec xmllint --noout {} \; 2>&1 || exit 1
          echo "All XML files are valid"

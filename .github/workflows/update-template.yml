name: Update UnRAID Template

on:
  workflow_dispatch:
    inputs:
      docker-image:
        description: "Docker image to use (e.g., ghcr.io/rorar/vibe-kanban-docker:latest)"
        required: true
        type: string
      template-name:
        description: "Template name to update (e.g., vibe-kanban)"
        required: true
        type: string
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false
        type: string
  repository_dispatch:
    types:
      - docker-image-published

permissions:
  contents: write
  pull-requests: write

jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine inputs
        id: inputs
        run: |
          DOCKER_IMAGE="${{ inputs.docker-image }}"
          TEMPLATE_NAME="${{ inputs.template-name }}"
          VERSION="${{ inputs.version || github.event.inputs.version || github.event.client_payload.version || '' }}"
          
          echo "docker-image=$DOCKER_IMAGE" >> $GITHUB_OUTPUT
          echo "template-name=$TEMPLATE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate inputs
        run: |
          if [ -z "${{ steps.inputs.outputs.docker-image }}" ]; then
            echo "Error: docker-image is required"
            exit 1
          fi
          if [ -z "${{ steps.inputs.outputs.template-name }}" ]; then
            echo "Error: template-name is required"
            exit 1
          fi
          echo "Updating template: ${{ steps.inputs.outputs.template-name }}"
          echo "Docker image: ${{ steps.inputs.outputs.docker-image }}"
          echo "Version: ${{ steps.inputs.outputs.version }}"

      - name: Update template
        run: |
          TEMPLATE_FILE="templates/${{ steps.inputs.outputs.template-name }}.xml"
          
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "Error: Template file $TEMPLATE_FILE not found"
            exit 1
          fi
          
          # Update Repository tag
          sed -i "s|<Repository>.*</Repository>|<Repository>${{ steps.inputs.outputs.docker-image }}</Repository>|" "$TEMPLATE_FILE"
          
          # Update Date
          DATE=$(date +%Y-%m-%d)
          sed -i "s|<Date>.*</Date>|<Date>$DATE</Date>|" "$TEMPLATE_FILE"
          
          # Update version in Changes if provided
          if [ -n "${{ steps.inputs.outputs.version }}" ]; then
            sed -i "s|<Changes></Changes>|<Changes>Updated to ${{ steps.inputs.outputs.version }}</Changes>|" "$TEMPLATE_FILE"
          fi
          
          echo "Template updated:"
          grep -E "(Repository|Date)" "$TEMPLATE_FILE"

      - name: Create PR or commit
        env:
          BRANCH_NAME: update/${{ steps.inputs.outputs.template-name }}-$(date +%Y%m%d%H%M%S)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git checkout -b "$BRANCH_NAME"
          git add templates/
          git diff --cached --stat
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(${{ steps.inputs.outputs.template-name }}): update docker image to ${{ steps.inputs.outputs.docker-image }}"
          
          # Try to push and create PR
          git push -u origin "$BRANCH_NAME" 2>/dev/null || true
          
          # Create PR using gh
          if gh pr create --title "Update ${{ steps.inputs.outputs.template-name }} template" --body "Automated update of Docker image to `${{ steps.inputs.outputs.docker-image }}`" --base main 2>/dev/null; then
            echo "PR created successfully"
          else
            echo "PR creation skipped (branch may already have open PR)"
          fi
          
          echo "Done! Changes committed to branch: $BRANCH_NAME"
